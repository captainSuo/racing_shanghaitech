<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC 实时遥测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dash {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px 40px;
            text-align: center;
            min-width: 180px;
        }
        .card .label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .card .value {
            font-size: 56px;
            font-weight: bold;
        }
        .speed .value { color: #00ff88; }
        .rpm .value { color: #ff6b6b; }
        .gear .value { color: #ffd93d; }
        .lap .value { color: #6bc5ff; }
        .best .value { color: #c084fc; }
        .pit {
            grid-column: span 3;
            background: #ff6b6b;
            border-color: #ff4444;
            display: none;
        }
        .pit.show { display: block; }
        .pit .label { color: #fff; }
        .pit .value { font-size: 28px; color: #fff; }
    </style>
</head>
<body>
    <div class="dash">
        <div class="card speed">
            <div class="label">速度 km/h</div>
            <div class="value" id="speed">0</div>
        </div>
        <div class="card rpm">
            <div class="label">转速 RPM</div>
            <div class="value" id="rpm">0</div>
        </div>
        <div class="card gear">
            <div class="label">档位</div>
            <div class="value" id="gear">N</div>
        </div>
        <div class="card lap">
            <div class="label">当前圈</div>
            <div class="value" id="lapTime">0:00.000</div>
        </div>
        <div class="card best">
            <div class="label">最佳圈</div>
            <div class="value" id="bestLap">--:--.---</div>
        </div>
        <div class="card">
            <div class="label">油门 / 刹车</div>
            <div class="value" style="font-size:28px;">
                <span id="gas" style="color:#00ff88;">0</span>
                <span style="color:#888;"> / </span>
                <span id="brake" style="color:#ff4444;">0</span>
            </div>
        </div>
        <div class="card pit" id="pitCard">
            <div class="label">⛽ 维修区</div>
            <div class="value">PIT</div>
        </div>
    </div>

    <script>
        const gearNames = ['R', 'N', '1', '2', '3', '4', '5', '6', '7', '8'];

        function pad(n) { return n.toString().padStart(2, '0'); }

        function formatTime(ms) {
            if (!ms || ms <= 0) return '--:--.---';
            const m = Math.floor(ms / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const r = ms % 1000;
            return `${m}:${pad(s)}.${pad(r)}`;
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ role: 'viewer' }));
                console.log('WebSocket 已连接');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'car_info') {
                    document.getElementById('speed').textContent = Math.round(data.speed_kmh);
                    document.getElementById('rpm').textContent = Math.round(data.engine_rpm);
                    document.getElementById('gear').textContent = gearNames[data.gear] || data.gear;
                    document.getElementById('lapTime').textContent = formatTime(data.lap_time_ms);
                    document.getElementById('bestLap').textContent = formatTime(data.best_lap_ms);
                    document.getElementById('gas').textContent = Math.round(data.gas * 100);
                    document.getElementById('brake').textContent = Math.round(data.brake * 100);

                    const pitCard = document.getElementById('pitCard');
                    if (data.is_in_pit) {
                        pitCard.classList.add('show');
                    } else {
                        pitCard.classList.remove('show');
                    }
                }
            };

            ws.onclose = () => {
                console.log('WebSocket 断开，3秒后重连...');
                setTimeout(connect, 3000);
            };

            ws.onerror = (e) => {
                console.error('WebSocket 错误', e);
            };
        }

        connect();
    </script>
</body>
</html>
