<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShanghaiTech Racing | 画廊</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="src/assets/images/Logo.png" alt="ShanghaiTech Racing" class="logo">
      <h1 class="title">Racing Gallery</h1>
    </div>
    <div class="gallery">
      <div class="card">
        <img src="src/assets/images/Car-1.png" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Car-2.png" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Car-3.png" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Car-4.png" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Race-1.jpg" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Race-2.jpg" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Race-3.jpg" alt="赛车", loading="lazy">
      </div>
      <div class="card">
        <img src="src/assets/images/Race-4.jpg" alt="赛车", loading="lazy">
      </div>
    </div>
  </div>
</body>
</html>
