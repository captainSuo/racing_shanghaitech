<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="keywords" content="ShanghaiTech Racing,ShanghaiTech,Racing,赛车,上海科技大学,上海科技大学赛车,上科大,社团,虚拟赛车,卡丁车,赛车电竞,模拟赛车,Sim Racing,神力科莎,Assetto Corsa,F1,GT3">
<meta name="description" content="上海科技大学赛车社——专注虚拟赛车（模拟赛车）与卡丁车。定期举办观赛派对、模拟器挑战赛、卡丁车体验活动。">
<title>上科大赛车 | ShanghaiTech Racing</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<style>
html {
  font-size: 24px;
  overflow-x: hidden;
  width: 100vw;
}
body {
    background-color: #0a0a0a;
    color: #e0e0e0;
    margin: 0;
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    scrollbar-gutter: stable;
}
.page-content {
    flex: 1;
    padding: 20px;
    margin: 10px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

a {
  text-decoration: none;
  color: inherit;
}

:root {
  --primary: #CC0000;
  --primary-glow: rgba(204, 0, 0, 0.25);
  --hover-glow: 0 8px 20px rgba(255, 255, 255, 0.1);
  --bg: #0a0a0a;
  --surface: #111111;
  --surface-hover: #111;
  --border: #222222;
  --text: #e0e0e0;
  --text-secondary: #888888;
  --radius: 20px;
}

/* ========== 导航栏 ========== */
.navbar {
  background-color: rgba(10, 10, 10, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #222;
  padding: 0 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  position: sticky;
  top: 0;
  margin: 0;
  z-index: 100;
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  font-weight: 700;
  font-size: 1.3rem;
  transition: all 0.3s;
}
.logo img {
  height: 38px;
}
.nav-links { display: flex; gap: 36px; }
.nav-links a {
  font-size: 0.9rem;
  font-weight: bold;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 10px;
  padding: 0px;
  border-radius: 10px;
  background-color: transparent;
  border: 0px;
  transition: all 0.3s;
  align-self: center;
}
.nav-links a:hover,
.nav-links a.active {
  border-radius: 18px;
  margin: 0px;
  padding: 10px;
  box-shadow: var(--hover-glow);
}

.nav-links a.active {
  color: #222;
  background-color: #aaa;
}

.nav-links a:hover {
  color: #fff;
  background-color: #333;
}

.nav-links a.active:hover {
  color: #222;
  background-color: #aaa;
}

@keyframes cardReveal {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.footer {
  background-color: var(--surface);
  border-top: 1px solid var(--border);
  padding: 32px 5%;
  text-align: center;
  font-size: 0.8rem;
  color: #555555;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-top: auto;
}

.section {
  padding: 40px 5%;
  margin: 0;
}

.section-header {
  text-align: left;
  margin-bottom: 48px;
  border-left: 3px solid var(--primary);
  padding-left: 18px;
}

.section-header h2 {
  font-size: 1.8rem;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}

.section-header .subtitle {
  font-size: 0.8rem;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
}

.menu-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  z-index: 200;
}
.menu-toggle span {
  display: block;
  width: 24px;
  height: 2px;
  background: #e0e0e0;
  border-radius: 2px;
  transition: all 0.3s;
}

.menu-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 150;
  opacity: 0;
  transition: opacity 0.3s;
}
.menu-overlay.active {
  display: block;
  opacity: 1;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -280px;
  width: 280px;
  height: 100%;
  background: #111;
  border-left: 1px solid #222;
  z-index: 200;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 8px;
  transition: right 0.3s ease;
}
.side-menu.active {
  right: 0;
}
.side-menu-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--primary);
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.side-menu-close {
  background: none;
  border: none;
  color: #888;
  font-size: 28px;
  cursor: pointer;
}
.side-menu a {
  color: #e0e0e0;
  font-size: 1rem;
  font-weight: bold;
  padding: 12px 0;
  border-bottom: 1px solid #1a1a1a;
  transition: color 0.3s;
}
.side-menu a:hover,
.side-menu a.active {
  color: #CC0000;
}

@media (max-width: 768px) {

  * {
    -webkit-tap-highlight-color: transparent;
  }

  html {
    font-size: 16px;
  }

  .section-header h1 {
    font-size: 1.5rem;
  }

  .navbar {
    padding: 0 16px;
    height: 56px;
  }
  .logo {
    font-size: 1rem;
    gap: 8px;
  }
  .logo img {
    height: 28px;
  }
  .nav-links {
    gap: 16px;
  }
  .nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.5px;
  }
  .page-content {
    padding: 12px;
    margin: 0;
  }
  .section {
    padding: 24px 16px;
  }
  .section-header {
    margin-bottom: 28px;
    padding-left: 12px;
  }
  .section-header h2 {
    font-size: 1.4rem;
  }
  .section-header .subtitle {
    font-size: 0.7rem;
  }

  .nav-links {
    display: none;
  }
  .menu-toggle {
    display: flex;
  }
}

@media (max-width: 480px) {
  .navbar {
    height: 48px;
  }
  .nav-links {
    gap: 10px;
  }
  .nav-links a {
    font-size: 0.7rem;
    padding: 4px 8px;
  }
}

</style>
</head>


<body>
  <nav class="navbar">
    <div class="logo">
        ShanghaiTech<span style="color:#CC0000;">Racing</span>
    </div>
    <div class="nav-links">
        <a href="/">首页</a>
        <a href="/events/">活动</a>
        <a href="/gallery/">画廊</a>
        <a href="/awards/">获奖</a>
    </div>
    <button class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<div class="menu-overlay" onclick="toggleMenu()"></div>
<div class="side-menu">
    <div class="side-menu-header">
        <span>MENU</span>
        <button class="side-menu-close" onclick="toggleMenu()">&times;</button>
    </div>
    <a href="/" onclick="toggleMenu()">首页</a>
    <a href="/events/" onclick="toggleMenu()">活动</a>
    <a href="/gallery/" onclick="toggleMenu()">画廊</a>
    <a href="/awards/" onclick="toggleMenu()">获奖</a>
</div>

<script>
(function() {
    var path = location.pathname;
    var current;
    if (path === '/') {
        current = '/';
    } else {
        var parts = path.split('/').filter(Boolean);
        current = '/' + parts[0] + '/';
    }
    var links = document.querySelectorAll('.nav-links a');
    for (var i = 0; i < links.length; i++) {
        if (links[i].getAttribute('href') === current) {
            links[i].classList.add('active');
        }
    }
})();

function toggleMenu() {
  document.querySelector('.side-menu').classList.toggle('active');
  document.querySelector('.menu-overlay').classList.toggle('active');
}
</script>

<div class="page-content">
