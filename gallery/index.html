<!--#include file="/components/header.html" -->
<link rel="stylesheet" href="/styles.css"/>

<div class="section">
  <div class="section-header">
    <div class="subtitle">Racing Gallery</div>
    <h2>画廊</h2>
  </div>

  <div class="gallery">
    <div class="gallery-item">
      <img src="/assets/images/Car-1.png" alt="赛车1" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Car-2.png" alt="赛车2" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Car-3.png" alt="赛车3" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Car-4.png" alt="赛车4" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Race-1.jpg" alt="比赛1" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Race-2.jpg" alt="比赛2" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Race-3.jpg" alt="比赛3" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Race-4.jpg" alt="比赛4" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Award-1.jpg" alt="奖杯1" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Award-2.jpg" alt="奖杯2" onclick="openLightbox(this.src)" />
    </div>
    <div class="gallery-item">
      <img src="/assets/images/Podium-1.jpg" alt="领奖台1" onclick="openLightbox(this.src)" />
    </div>
  </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="放大图片" />
</div>

<style>
  .title {
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    animation: glowPulse 3s infinite;
  }
  @keyframes glowPulse {
    0%,
    100% {
      text-shadow: 0 0 5px rgba(204, 0, 0, 0.3);
    }
    50% {
      text-shadow: 0 0 20px rgba(204, 0, 0, 0.7);
    }
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    width: 90%;
    justify-self: center;
  }
  .gallery-item {
    flex: 1 1 calc(25% - 15px);
    min-width: 240px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s;
    opacity: 0;
    animation: cardReveal 0.5s forwards;
  }
  .gallery-item:nth-child(1) { animation-delay: 0.05s; }
  .gallery-item:nth-child(2) { animation-delay: 0.1s; }
  .gallery-item:nth-child(3) { animation-delay: 0.15s; }
  .gallery-item:nth-child(4) { animation-delay: 0.2s; }
  .gallery-item:nth-child(5) { animation-delay: 0.25s; }
  .gallery-item:nth-child(6) { animation-delay: 0.3s; }
  .gallery-item:nth-child(7) { animation-delay: 0.35s; }
  .gallery-item:nth-child(8) { animation-delay: 0.4s; }
  .gallery-item:hover {
    transform: translateY(-2px);
    border-color: #cc0000;
    box-shadow: 0 8px 30px rgba(255, 255, 255, 0.08),
      0 0 25px rgba(204, 0, 0, 0.25);
  }
  .gallery-item img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #1a1a1a;
    transition: transform 0.4s;
    cursor: pointer;
  }
  .gallery-item:hover img {
    transform: scale(1.05);
  }
  
  .lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .lightbox.active {
    display: flex;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    z-index: 1001;
  }
  .lightbox-close:hover {
    color: #cc0000;
  }

  @media (max-width: 1024px) {
    .gallery-item {
      flex: 1 1 calc(33.333% - 14px);
    }
  }
  @media (max-width: 768px) {
    .gallery-item {
      flex: 1 1 calc(50% - 10px);
    }
    .title {
      font-size: 1.6rem;
    }
  }
  @media (max-width: 480px) {
    .gallery-item {
      flex: 1 1 100%;
    }
  }
</style>

<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
</script>
